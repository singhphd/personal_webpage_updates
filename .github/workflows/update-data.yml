name: Update Data

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch Google Scholar Data
        id: scholar
        continue-on-error: true
        run: python scripts/sync-scholar.py

      - name: Fallback to Semantic Scholar
        if: steps.scholar.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "Google Scholar sync failed, using Semantic Scholar fallback..."
          node scripts/sync-publications-semantic.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch GitHub Data
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: node scripts/sync-github.js

      - name: Validate data integrity
        id: validate
        run: |
          echo "Validating data files..."
          
          # Check publications.json
          PUB_COUNT=$(jq length src/data/publications.json 2>/dev/null || echo "0")
          echo "Publications count: $PUB_COUNT"
          
          if [ "$PUB_COUNT" -lt 10 ]; then
            echo "WARNING: publications.json only has $PUB_COUNT entries (expected 10+)"
            echo "Restoring from git..."
            git checkout HEAD -- src/data/publications.json
            echo "pub_restored=true" >> $GITHUB_OUTPUT
          fi
          
          # Check github.json
          GH_COUNT=$(jq length src/data/github.json 2>/dev/null || echo "0")
          echo "GitHub repos count: $GH_COUNT"
          
          if [ "$GH_COUNT" -eq 0 ]; then
            echo "WARNING: github.json is empty"
            echo "Restoring from git..."
            git checkout HEAD -- src/data/github.json
            echo "gh_restored=true" >> $GITHUB_OUTPUT
          fi
          
          echo "Validation complete."

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/*.json
          
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update data [skip ci]"
            git push
            echo "Changes committed and pushed."
          fi
